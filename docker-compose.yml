version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reservas_user
      POSTGRES_PASSWORD: reservas_password
      POSTGRES_DB: gestion_reservas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gestion_reservas_backend
    environment:
      DATABASE_URL: postgresql://reservas_user:reservas_password@db:5432/gestion_reservas
      DEBUG: "False"
      ENVIRONMENT: production
      SECRET_KEY: your-secret-key-here
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
